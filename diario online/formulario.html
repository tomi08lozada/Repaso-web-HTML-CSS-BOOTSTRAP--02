<!DOCTYPE html>
<html lang="es">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>El Diario Digital</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&family=Roboto&display=swap" rel="stylesheet">

<style>
    body { font-family: 'Roboto', sans-serif; background: #f4f4f4; }
    header h1 { font-family: 'Playfair Display', serif; font-size: 48px; }
    .etiqueta { color: red; font-weight: bold; font-size: 14px; }
    .titular-principal { font-family: 'Playfair Display', serif; color: #b00000; }
    .noticia h3 { color: #003366; font-family: 'Playfair Display', serif; }
    .noticia { transition: 0.3s; }
    .noticia:hover { transform: translateY(-8px); box-shadow: 0px 10px 20px rgba(0,0,0,0.2); }
    .noticia img, .principal img { width: 100%; object-fit: cover; border-radius: 5px; }
    a { text-decoration: none; color: inherit; }
</style>
</head>

<body>

<header class="bg-black text-white text-center py-4">
    <h1>El Diario Digital</h1>
</header>

<nav class="bg-dark text-center py-2">
    <a href="index.html" class="text-white mx-3 fs-5">Inicio</a>
    <a href="politica.html" class="text-white mx-3 fs-5">Política</a>
    <a href="deportes.html" class="text-white mx-3 fs-5">Deportes</a>
    <a href="formulario.html" class="text-white mx-3 fs-5">Contacto👤</a>
</nav>
<div class="container d-flex justify-content-center align-items-center min-vh-100">
  <div class="col-12 col-md-6 col-lg-4">
    <div class="card shadow p-4">

      <h4 class="text-center mb-4">Contacto</h4>

      <form id="formulario">
        
        <div class="mb-3">
          <label class="form-label">Nombre</label>
          <input type="text" class="form-control" placeholder="Tu nombre" required>
        </div>

        <div class="mb-3">
          <label class="form-label">Correo electrónico</label>
          <input type="email" class="form-control" placeholder="name@example.com" required>
        </div>

        <div class="mb-3">
          <label class="form-label">Mensaje</label>
          <textarea class="form-control" rows="3" placeholder="Escribí tu mensaje..." required></textarea>
        </div>

        <button type="submit" class="btn btn-primary w-100">Enviar</button>
      
      </form>

    </div>
  </div>
</div>

<!-- Notificación -->
<div class="position-fixed bottom-0 end-0 p-3">
  <div id="toastEnviado" class="toast align-items-center text-bg-success border-0">
    <div class="d-flex">
      <div class="toast-body">
        ✅ Mensaje enviado correctamente
      </div>
      <button type="button" class="btn-close btn-close-white me-2 m-auto" data-bs-dismiss="toast"></button>
    </div>
  </div>
</div>

<script>
  const form = document.getElementById("formulario");
  const toastElement = document.getElementById("toastEnviado");

  form.addEventListener("submit", function(e) {
    e.preventDefault();

    const toast = new bootstrap.Toast(toastElement);
    toast.show();

    form.reset();
  });
</script>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <footer class="bg-black text-white text-center py-3 mt-5">
    <p class="mb-0">© 2026 El Diario Digital</p>
    </footer>

</body>
</html>
